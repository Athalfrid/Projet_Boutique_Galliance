<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Catalogue Atelier</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        h1 { color: #333; text-align: center; }
        
        /* Style du bouton d'install */
        #installBtn { 
            display: none; width: 100%; padding: 15px; background: #27ae60; 
            color: white; border: none; border-radius: 5px; font-weight: bold; margin-bottom: 20px;
        }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; border-radius: 5px; }
        .price { color: #e67e22; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>

    <h1>📦 Catalogue Atelier</h1>
    <button id="installBtn">📲 INSTALLER SUR MON TÉLÉPHONE</button>

    <div class="product-grid" id="productGrid">
        </div>

    <script>
        // 1. Affichage des produits
        fetch('products.json')
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById('productGrid');
                data.forEach(p => {
                    grid.innerHTML += `
                        <div class="card">
                            <img src="${p.img}" alt="${p.nom}">
                            <h3>${p.nom}</h3>
                            <p>${p.desc}</p>
                            <p>${p.label}</p>
                            <p class="price">${p.prix} 🪶</p>
                        </div>`;
                });
            });

        // 2. Logique d'installation
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'block';
        });

        document.getElementById('installBtn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
                document.getElementById('installBtn').style.display = 'none';
            }
        });

        // 3. Enregistrement du Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
